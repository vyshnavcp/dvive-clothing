<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POS Billing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#eef2f7,#f9fbfd);
    font-family:'Poppins',sans-serif;
}

/* NAVBAR */
.header-with-topbar{
    background:#0d0d0d;
    box-shadow:0 6px 25px rgba(0,0,0,0.4);
} 
.dashboard-header{padding:18px 28px;} 
.dashboard-header h4,.dashboard-header small,.dashboard-header i{color:#fff;} 
.dashboard-header .nav-link{color:#e6e6e6 !important;font-weight:500;transition:.25s;} 
.dashboard-header .nav-link:hover{color:#fff !important;opacity:.8;} 
.navbar-toggler{border:0;} 
.navbar-toggler-icon{filter:invert(1);} 

/* PAGE */
.page-wrapper{padding:40px 20px;} 
.section-title{font-weight:600;margin-bottom:18px;} 
.card{
    border:none;
    border-radius:18px;
    box-shadow:0 14px 40px rgba(0,0,0,.08);
}

/* PRODUCT CARD */
.product-card .card{
    transition:.25s;
    padding:16px;
}
.product-card .card:hover{
    transform:translateY(-4px);
    box-shadow:0 16px 40px rgba(0,0,0,.12);
}
.product-name{font-weight:500;font-size:.95rem;height:38px;overflow:hidden;} 
.product-price{font-weight:600;color:#111;} 
.stock{font-size:.8rem;color:#777;} 

/* CART */
.cart-card{
    position:sticky;
    top:20px;
}
.cart-item{
    font-size:.9rem;
}

/* BUTTONS */
.btn-black{
    background:#000;
    color:#fff;
    border-radius:12px;
    padding:10px 14px;
    font-size:.85rem;
    font-weight:500;
}
.btn-black:hover{background:#1a1a1a;color:#fff;} 
.btn-success{
    border-radius:14px;
    font-weight:600;
    padding:14px;
}

.quantity-input{
    width:60px;
    text-align:center;
}

.total-box{
    background:#f4f6f9;
    border-radius:12px;
    padding:12px;
    font-weight:600;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="header-with-topbar">
<nav class="navbar dashboard-header navbar-expand-lg">
<div class="container-fluid px-0">

<div class="d-flex align-items-center gap-3">
<i class="bi bi-speedometer2 fs-2"></i>
<div>
<h4 class="mb-0">Admin POS</h4>
<small>Billing & Checkout</small>
</div>
</div>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="adminNavbar">
<ul class="navbar-nav align-items-lg-center gap-lg-3 mt-3 mt-lg-0">
<li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="{% url 'order_list' %}">Orders</a></li>
<li class="nav-item"><a class="nav-link text-danger" href="{% url 'user_logout' %}">Logout</a></li>
</ul>
</div>

</div>
</nav>
</header>

<!-- PAGE CONTENT -->
<div class="page-wrapper">
<div class="container-fluid">

<h4 class="section-title">POS Billing</h4>

<div class="row mb-3">
<div class="col-md-6">
<input type="text" id="productSearch" class="form-control" placeholder="Search product name or code" onkeyup="filterProducts()">
</div>
</div>

<div class="row">

<!-- PRODUCTS -->
<div class="col-lg-8">
<div class="row" id="productGrid">
{% for product in products %}
<div class="col-md-4 mb-3 product-card" data-name="{{ product.name|lower }}" data-code="{{ product.product_code|lower }}">
<div class="card text-center">
<div class="product-name">{{ product.name }}</div>
<div class="product-price">₹ {{ product.price }}</div>
<div class="stock">Stock: {{ product.stock }}</div>

{% if product.stock > 0 %}
<div class="d-flex justify-content-center gap-2 align-items-center mt-2">
<input type="number" min="1" max="{{ product.stock }}" value="1" class="form-control form-control-sm quantity-input">
<button class="btn btn-black btn-sm" onclick="addToCart({{ product.id }}, '{{ product.name }}', {{ product.price }}, {{ product.stock }}, this)">
Add
</button>
</div>
{% else %}
<button class="btn btn-secondary btn-sm mt-2" disabled>Out of Stock</button>
{% endif %}
</div>
</div>
{% endfor %}
</div>
</div>

<!-- CART -->
<div class="col-lg-4">
<div class="card p-3 cart-card">
<h5 class="mb-3">Cart</h5>

<!-- NEW FIELDS -->
<div class="mb-2">
    <label class="form-label">Customer Name</label>
    <input type="text" id="customerName" class="form-control" placeholder="Enter customer name">
</div>

<div class="mb-3">
    <label class="form-label">Phone Number</label>
    <input type="text" id="customerPhone" class="form-control" placeholder="Enter phone number">
</div>

<ul id="cart-list" class="list-group mb-3"></ul>

<div class="total-box mb-3">
Total: ₹ <span id="total">0</span>
</div>

<div class="mb-3">
<label class="form-label">Payment Method</label>
<select id="paymentMethod" class="form-select">
<option value="cash">💵 Cash</option>
<option value="upi">📱 UPI</option>
<option value="card">💳 Card</option>
</select>
</div>

<button class="btn btn-success w-100" onclick="checkout()">
Complete Order
</button>
</div>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let cart = [];

// ADD TO CART
function addToCart(id, name, price, stock, btn) {
    const qtyInput = btn.previousElementSibling;
    let quantity = parseInt(qtyInput.value) || 1;
    if(quantity > stock) quantity = stock;

    let item = cart.find(p => p.id === id);
    if(item){
        if(item.quantity + quantity <= stock) item.quantity += quantity;
        else item.quantity = stock;
    } else {
        cart.push({id, name, price, quantity, stock});
    }

    renderCart();
    qtyInput.value = 1;
}

// REMOVE FROM CART
function removeFromCart(id) {
    cart = cart.filter(item => item.id !== id);
    renderCart();
}

// RENDER CART
function renderCart() {
    let list = document.getElementById("cart-list");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item => {
        total += item.price * item.quantity;
        list.innerHTML += `
        <li class="list-group-item d-flex justify-content-between align-items-center cart-item">
            <span>${item.name} x ${item.quantity}</span>
            <div>
                ₹ ${item.price * item.quantity}
                <button class="btn btn-sm btn-outline-danger ms-2" onclick="removeFromCart(${item.id})">&times;</button>
            </div>
        </li>`;
    });

    document.getElementById("total").innerText = total;
}

// SEARCH PRODUCTS
function filterProducts() {
    const query = document.getElementById("productSearch").value.toLowerCase();
    const products = document.querySelectorAll(".product-card");

    products.forEach(card => {
        const name = card.dataset.name;
        const code = card.dataset.code;
        card.style.display = (name.includes(query) || code.includes(query)) ? "block" : "none";
    });
}

// GET CSRF
function getCSRFToken() {
    return document.querySelector('meta[name="csrf-token"]').getAttribute('content');
}

// CHECKOUT
function checkout() {
    if (cart.length === 0) return;

    const posPaymentType = document.getElementById("paymentMethod").value;
    const customerName = document.getElementById("customerName").value.trim();
    const customerPhone = document.getElementById("customerPhone").value.trim();

    if (!customerName || !customerPhone) {
        alert("Please enter customer name and phone number");
        return;
    }

    fetch("{% url 'pos_create_order' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ 
            items: cart,
            payment_method: "pos",
            pos_payment_type: posPaymentType,
            customer_name: customerName,
            customer_phone: customerPhone
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === "success") {
            window.location.href = "{% url 'dashboard' %}";
        } else {
            alert(data.message || "Error processing order");
        }
    })
    .catch(err => console.error(err));
}
</script>

</body>
</html>
