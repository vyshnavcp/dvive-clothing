<!DOCTYPE html>
<html>
<head>
    <title>POS Billing</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h3 class="mb-4">POS Billing</h3>

<div class="row">

    <!-- PRODUCTS -->
    <div class="col-md-7">
        <div class="row">
            {% for product in products %}
            <div class="col-md-4 mb-3">
                <div class="card p-2 text-center shadow-sm">
                    <h6>{{ product.name }}</h6>
                    <p class="fw-bold">₹ {{ product.price }}</p>
                    <button class="btn btn-dark btn-sm"
                        onclick="addToCart({{ product.id }}, '{{ product.name }}', {{ product.price }})">
                        Add
                    </button>
                </div>
            </div>
            {% empty %}
                <p>No Products Available</p>
            {% endfor %}
        </div>
    </div>

    <!-- CART -->
    <div class="col-md-5">
        <div class="card p-3 shadow-sm">
            <h5>Cart</h5>

            <ul id="cart-list" class="list-group mb-3"></ul>

            <h5>Total: ₹ <span id="total">0</span></h5>

            <button class="btn btn-success w-100" onclick="checkout()">
                Complete Order
            </button>
        </div>
    </div>

</div>

<script>
let cart = [];

// Add to cart
function addToCart(id, name, price) {
    let item = cart.find(p => p.id === id);
    if (item) {
        item.quantity += 1;
    } else {
        cart.push({id, name, price, quantity: 1});
    }
    renderCart();
}

// Render cart
function renderCart() {
    let list = document.getElementById("cart-list");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item => {
        total += item.price * item.quantity;
        list.innerHTML += `
            <li class="list-group-item d-flex justify-content-between">
                ${item.name} x ${item.quantity}
                <span>₹ ${item.price * item.quantity}</span>
            </li>`;
    });

    document.getElementById("total").innerText = total;
}

// Get CSRF
function getCSRFToken() {
    return document.querySelector('meta[name="csrf-token"]').getAttribute('content');
}

// Checkout
function checkout() {

    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    fetch("{% url 'pos_create_order' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ items: cart })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === "success") {
            alert("Order Created Successfully!");
            cart = [];
            renderCart();
        } else {
            alert(data.message || "Error creating order");
        }
    })
    .catch(error => {
        alert("JS Error occurred");
        console.log(error);
    });
}
</script>

</body>
</html>
