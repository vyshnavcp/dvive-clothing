<!DOCTYPE html>
<html>
<head>
    <title>POS Billing</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h3 class="mb-4">POS Billing</h3>

<div class="row mb-3">
    <div class="col-md-7">
        <input type="text" id="productSearch" class="form-control" placeholder="Search by name or code" onkeyup="filterProducts()">
    </div>
</div>

<div class="row">

    <!-- PRODUCTS -->
    <div class="col-md-7">
        <div class="row" id="productGrid">
            {% for product in products %}
            <div class="col-md-4 mb-3 product-card" data-name="{{ product.name|lower }}" data-code="{{ product.product_code|lower }}">
                <div class="card p-2 text-center shadow-sm">
                    <h6>{{ product.name }}</h6>
                    <p class="fw-bold">₹ {{ product.price }}</p>
                    <p class="small text-muted">Stock: {{ product.stock }}</p>
                    {% if product.stock > 0 %}
                        <button class="btn btn-dark btn-sm"
                            onclick="addToCart({{ product.id }}, '{{ product.name }}', {{ product.price }}, {{ product.stock }})">
                            Add
                        </button>
                    {% else %}
                        <button class="btn btn-secondary btn-sm" disabled>Out of Stock</button>
                    {% endif %}
                </div>
            </div>
            {% empty %}
                <p>No Products Available</p>
            {% endfor %}
        </div>
    </div>

    <!-- CART -->
    <div class="col-md-5">
        <div class="card p-3 shadow-sm">
            <h5>Cart</h5>

            <ul id="cart-list" class="list-group mb-3"></ul>

            <h5>Total: ₹ <span id="total">0</span></h5>

            <button class="btn btn-success w-100" onclick="checkout()">
                Complete Order
            </button>
        </div>
    </div>

</div>

<script>
let cart = [];

// Add to cart
function addToCart(id, name, price, stock) {
    let item = cart.find(p => p.id === id);
    if (item) {
        if(item.quantity < stock) item.quantity += 1;
    } else {
        cart.push({id, name, price, quantity: 1, stock: stock});
    }
    renderCart();
}

// Remove from cart
function removeFromCart(id) {
    cart = cart.filter(item => item.id !== id);
    renderCart();
}

// Render cart
function renderCart() {
    let list = document.getElementById("cart-list");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item => {
        total += item.price * item.quantity;
        list.innerHTML += `
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>${item.name} x ${item.quantity}</span>
                <div>
                    ₹ ${item.price * item.quantity}
                    <button class="btn btn-sm btn-outline-danger ms-2" onclick="removeFromCart(${item.id})">&times;</button>
                </div>
            </li>`;
    });

    document.getElementById("total").innerText = total;
}

// Search / Filter products
function filterProducts() {
    const query = document.getElementById("productSearch").value.toLowerCase();
    const products = document.querySelectorAll(".product-card");

    products.forEach(card => {
        const name = card.dataset.name;
        const code = card.dataset.code;
        if (name.includes(query) || code.includes(query)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}

// Get CSRF
function getCSRFToken() {
    return document.querySelector('meta[name="csrf-token"]').getAttribute('content');
}

// Checkout
function checkout() {
    if (cart.length === 0) return;

    fetch("{% url 'pos_create_order' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ items: cart })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === "success") {
            window.location.href = "{% url 'dashboard' %}";
        }
    })
    .catch(error => console.log(error));
}
</script>

</body>
</html>
