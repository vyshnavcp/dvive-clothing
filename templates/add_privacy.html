{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Privacy Policy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

{{ form.media }}

<style>

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#eef2f7,#dde3ec);
    min-height:100vh;
}

/* NAVBAR */

.navbar-premium{
    background:#000;
    padding:18px 30px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.navbar-brand{
    color:#fff !important;
    font-weight:600;
}

.nav-link{
    color:#ddd !important;
    font-weight:500;
}

.nav-link:hover{
    color:#fff !important;
}

/* PAGE */

.page-wrapper{
    padding:60px 20px;
}

/* CARD */

.premium-card{
    background:#fff;
    border:none;
    border-radius:22px;
    padding:40px;
    max-width:900px;
    margin:auto;
    box-shadow:0 25px 60px rgba(0,0,0,.08);
}

/* TITLE */

.page-title{
    font-weight:700;
    margin-bottom:30px;
    text-align:center;
}

/* BUTTON */

.btn-save{
    background:linear-gradient(45deg,#000,#333);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:12px;
    font-weight:600;
    width:100%;
}

.btn-save:hover{
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* CKEDITOR */

.ck-editor__editable{
    min-height:320px !important;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-premium">
<div class="container">

<a class="navbar-brand" href="#">
<i class="bi bi-speedometer2 me-2"></i> Admin Dashboard
</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="adminNavbar">

<ul class="navbar-nav gap-lg-3">

<li class="nav-item">
<a class="nav-link" href="{% url 'dashboard' %}">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'order_list' %}">Orders</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'privacy_list' %}">Privacy List</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'paid_orders' %}">Paid</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'pending_orders' %}">Pending</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'customer_list' %}">Customers</a>
</li>

<li class="nav-item">
<a class="nav-link text-danger" href="{% url 'user_logout' %}">
Logout
</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- PAGE -->

<div class="page-wrapper">

<div class="premium-card">

<h3 class="page-title">
<i class="bi bi-shield-lock me-2"></i>
{% if privacy %}Edit{% else %}Add{% endif %} Privacy Policy
</h3>

<form method="POST">
{% csrf_token %}

<div class="mb-4">
<label class="form-label fw-semibold">Privacy Policy Content</label>
{{ form.content }}
</div>

<button class="btn-save">
<i class="bi bi-check-circle me-1"></i>
{% if privacy %}Update Privacy{% else %}Save Privacy{% endif %}
</button>

<a href="{% url 'privacy_list' %}" class="btn btn-secondary mt-3 w-100">
Back
</a>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
