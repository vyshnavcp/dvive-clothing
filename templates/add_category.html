<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Category</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#eef2f7,#dfe6ee);
    min-height:100vh;
}

/* NAVBAR */

.navbar-premium{
    background:#000;
    padding:18px 30px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.navbar-brand{
    color:#fff !important;
    font-weight:600;
}

.nav-link{
    color:#ddd !important;
    font-weight:500;
}

.nav-link:hover{
    color:#fff !important;
}

.logout{
    color:#ff5b5b !important;
}

/* PAGE */

.page-wrapper{
    min-height:calc(100vh - 80px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

/* CARD */

.premium-card{
    background:#fff;
    border:none;
    border-radius:22px;
    padding:40px;
    width:100%;
    max-width:450px;
    box-shadow:0 25px 60px rgba(0,0,0,.08);
    transition:.3s;
}

.premium-card:hover{
    transform:translateY(-4px);
}

/* TITLE */

.page-title{
    font-weight:700;
    text-align:center;
    margin-bottom:25px;
}

/* INPUT */

.form-control{
    border-radius:12px;
    padding:12px;
    border:1px solid #e2e2e2;
}

.form-control:focus{
    border-color:#000;
    box-shadow:none;
}

/* BUTTON */

.btn-save{
    background:linear-gradient(45deg,#000,#333);
    color:#fff;
    border:none;
    border-radius:14px;
    padding:13px;
    font-weight:600;
    width:100%;
    transition:.3s;
}

.btn-save:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-premium">
<div class="container">

<a class="navbar-brand" href="#">
<i class="bi bi-speedometer2 me-2"></i> Category
</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="adminNavbar">

<ul class="navbar-nav gap-lg-3">

<li class="nav-item">
<a class="nav-link" href="{% url 'dashboard' %}">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'order_list' %}">Orders</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'category_list' %}">Category List</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'paid_orders' %}">Paid</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'pending_orders' %}">Pending</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'customer_list' %}">Customers</a>
</li>

<li class="nav-item">
<a class="nav-link logout" href="{% url 'user_logout' %}">
Logout
</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- PAGE CONTENT -->

<div class="page-wrapper">

<div class="premium-card">

<h3 class="page-title">
<i class="bi bi-folder-plus me-2"></i> Add Category
</h3>

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label class="form-label fw-medium">Category Name</label>
<input type="text" name="name" class="form-control" placeholder="Enter category name" required>
</div>

<button type="submit" class="btn-save">
<i class="bi bi-check-circle me-2"></i> Save Category
</button>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
