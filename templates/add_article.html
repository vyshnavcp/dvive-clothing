<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Article</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{background:#f4f6f9;font-family:'Poppins',sans-serif;}
.header-with-topbar{background:#000;box-shadow:0 4px 20px rgba(0,0,0,0.35);}
.dashboard-header{padding:18px 24px;}
.dashboard-header h4,.dashboard-header small,.dashboard-header i{color:#fff;}
.dashboard-header .nav-link{color:#fff !important;font-weight:500;}
.dashboard-header .nav-link:hover{color:#bdbdbd !important;}

.page-wrapper{padding:40px 20px;}
.card{
    border:none;
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.08);
    padding:28px;
}
.section-title{
    font-weight:600;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    gap:10px;
}
.section-title::before{
    content:"";
    width:4px;
    height:18px;
    background:#000;
    border-radius:2px;
}
.btn-black{
    background:#000;
    color:#fff;
    border-radius:14px;
    padding:14px;
    font-weight:600;
    width:100%;
}
.btn-black:hover{background:#222;}
.ck-editor__editable{min-height:300px !important;}
</style>
</head>

<body>

<header class="header-with-topbar">
<nav class="navbar dashboard-header navbar-expand-lg">
<div class="container-fluid px-0">
<div class="d-flex align-items-center gap-3">
<i class="bi bi-speedometer2 fs-2"></i>
<div>
<h4 class="mb-0">Admin Dashboard</h4>
<small>Overview of store performance</small>
</div>
</div>
</div>
</nav>
</header>

<div class="page-wrapper">
<div class="container">
<div class="row justify-content-center">
<div class="col-lg-10">

<div class="card">
<h4 class="fw-bold mb-4">Add New Article</h4>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="section-title">Article Details</div>

<div class="mb-3">
<label class="fw-medium">Title</label>
<input type="text" name="title" class="form-control" required>
</div>

<div class="mb-3">
<label class="fw-medium">Image</label>
<input type="file" name="image" class="form-control" required>
</div>

<div class="mb-4">
<label class="fw-medium">Content</label>
<textarea name="content" id="editor" class="form-control"></textarea>
</div>

<button class="btn-black">
<i class="bi bi-save me-1"></i> Publish Article
</button>

</form>
</div>

</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>

<script>
ClassicEditor.create(document.querySelector('#editor')).catch(error => console.error(error));
</script>

</body>
</html>
