<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Article</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#eef2f7,#dfe6ee);
    min-height:100vh;
}

/* NAVBAR */

.navbar-premium{
    background:#000;
    padding:18px 30px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.navbar-brand{
    color:#fff !important;
    font-weight:600;
    font-size:22px;
}

.nav-link{
    color:#ddd !important;
    font-weight:500;
    margin-left:15px;
}

.nav-link:hover{
    color:#fff !important;
}

/* PAGE */

.page-wrapper{
    padding:60px 20px;
}

/* CARD */

.premium-card{
    background:#fff;
    border:none;
    border-radius:22px;
    padding:40px;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
    transition:.3s;
}

.premium-card:hover{
    transform:translateY(-3px);
}

/* TITLE */

.page-title{
    font-weight:700;
    margin-bottom:30px;
}

/* SECTION */

.section-title{
    font-weight:600;
    margin-bottom:15px;
    position:relative;
    padding-left:15px;
}

.section-title::before{
    content:"";
    width:5px;
    height:20px;
    background:#000;
    position:absolute;
    left:0;
    top:2px;
    border-radius:3px;
}

/* INPUT */

.form-control{
    border-radius:12px;
    padding:12px;
    border:1px solid #e2e2e2;
}

.form-control:focus{
    box-shadow:none;
    border-color:#000;
}

/* BUTTON */

.btn-publish{
    background:linear-gradient(45deg,#000,#333);
    border:none;
    padding:14px;
    border-radius:14px;
    width:100%;
    color:#fff;
    font-weight:600;
    transition:.3s;
}

.btn-publish:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* CKEDITOR */

.ck-editor__editable{
    min-height:300px !important;
}

/* RESPONSIVE */

@media(max-width:768px){
    .premium-card{
        padding:25px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-premium">
<div class="container">

<a class="navbar-brand" href="#">
<i class="bi bi-speedometer2 me-2"></i> Admin Dashboard
</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#"><i class="bi bi-house me-1"></i> Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#"><i class="bi bi-newspaper me-1"></i> Articles</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#"><i class="bi bi-person me-1"></i> Profile</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- PAGE -->

<div class="page-wrapper">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-9">

<div class="premium-card">

<h3 class="page-title">
<i class="bi bi-plus-circle me-2"></i> Add New Article
</h3>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="section-title">Article Details</div>

<div class="mb-3">
<label class="fw-medium mb-1">Title</label>
<input type="text" name="title" class="form-control" placeholder="Enter article title" required>
</div>

<div class="mb-3">
<label class="fw-medium mb-1">Article Image</label>
<input type="file" name="image" class="form-control" required>
</div>

<div class="mb-4">
<label class="fw-medium mb-1">Content</label>
<textarea name="content" id="editor" class="form-control"></textarea>
</div>

<button class="btn-publish">
<i class="bi bi-send-check me-2"></i> Publish Article
</button>

</form>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>

<script>
ClassicEditor
.create(document.querySelector('#editor'))
.catch(error => console.error(error));
</script>

</body>
</html>
