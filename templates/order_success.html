<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Successful</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
}

/* Card */
.success-card{
    width:430px;
    background:#fff;
    border-radius:20px;
    padding:45px 40px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,0.12);
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(25px);}
    to{opacity:1;transform:translateY(0);}
}

/* Icon */
.icon-circle{
    width:85px;
    height:85px;
    margin:0 auto 20px;
    border-radius:50%;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    color:#fff;
    box-shadow:0 12px 30px rgba(34,197,94,.35);
}

/* Title */
.success-title{
    font-size:26px;
    font-weight:600;
    color:#222;
    margin-bottom:6px;
}

/* Subtitle */
.success-sub{
    color:#666;
    font-size:14px;
    margin-bottom:28px;
}

/* Order Box */
.order-box{
    background:#fafafa;
    border-radius:14px;
    padding:18px 20px;
    text-align:left;
    margin-bottom:28px;
    border:1px solid #f0f0f0;
}

.order-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:14px;
    color:#555;
}

.order-row:last-child{
    margin-bottom:0;
}

.order-label{
    font-weight:500;
    color:#888;
}

.order-value{
    font-weight:600;
    color:#222;
}

/* Buttons */
.btn-group{
    display:flex;
    gap:12px;
    justify-content:center;
}

.btn{
    padding:12px 24px;
    border-radius:50px;
    font-size:14px;
    font-weight:500;
    text-decoration:none;
    transition:.3s;
}

.btn-primary{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:#fff;
    box-shadow:0 8px 20px rgba(34,197,94,.35);
}

.btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 28px rgba(34,197,94,.45);
}

.btn-secondary{
    background:#f3f4f6;
    color:#111;
}

.btn-secondary:hover{
    background:#e5e7eb;
}

/* Responsive */
@media(max-width:480px){
    .success-card{
        width:92%;
        padding:35px 25px;
    }
}
</style>
</head>

<body>

<div class="success-card">

    <div class="icon-circle">✓</div>

    <div class="success-title">Payment Successful</div>
    <div class="success-sub">Your payment has been confirmed</div>

    {% if order %}
    <div class="order-box">
        <div class="order-row">
            <span class="order-label">Order ID</span>
            <span class="order-value">#{{ order.id }}</span>
        </div>
        <div class="order-row">
            <span class="order-label">Amount Paid</span>
            <span class="order-value">₹{{ order.total }}</span>
        </div>
        <div class="order-row">
            <span class="order-label">Payment Method</span>
            <span class="order-value">Online Payment</span>
        </div>
    </div>
    {% endif %}

    <div class="btn-group">
        <a href="{% url 'home' %}" class="btn btn-primary">Continue Shopping</a>

        {% if order %}
        <a href="{% url 'order_detail' order.id %}" class="btn btn-secondary">View Order</a>
        {% endif %}
    </div>

</div>

</body>
</html>
