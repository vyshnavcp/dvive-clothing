{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% if faq %}Edit FAQ{% else %}Add FAQ{% endif %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- CKEditor -->
{{ form.media }}

<style>

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#eef2f7,#dfe6ee);
    min-height:100vh;
}

/* NAVBAR */

.navbar-premium{
    background:#000;
    padding:18px 30px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.navbar-brand{
    color:#fff !important;
    font-weight:600;
}

.nav-link{
    color:#ddd !important;
    font-weight:500;
}

.nav-link:hover{
    color:#fff !important;
}

/* PAGE */

.page-wrapper{
    padding:60px 20px;
}

/* CARD */

.premium-card{
    background:#fff;
    border:none;
    border-radius:22px;
    padding:40px;
    max-width:850px;
    margin:auto;
    box-shadow:0 25px 60px rgba(0,0,0,.08);
}

/* TITLE */

.page-title{
    font-weight:700;
    margin-bottom:30px;
}

/* INPUT */

.form-control{
    border-radius:12px;
    padding:12px;
    border:1px solid #e2e2e2;
}

.form-control:focus{
    border-color:#000;
    box-shadow:none;
}

/* QUESTION INPUT */

.big-input{
    height:55px;
    font-size:18px;
}

/* BUTTONS */

.btn-save{
    background:linear-gradient(45deg,#000,#333);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:12px 26px;
    font-weight:600;
}

.btn-save:hover{
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.btn-back{
    border-radius:12px;
    padding:12px 26px;
}

/* CKEDITOR */

.ck-editor__editable{
    min-height:220px !important;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-premium">
<div class="container">

<a class="navbar-brand" href="#">
<i class="bi bi-speedometer2 me-2"></i> Admin Dashboard
</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="adminNavbar">

<ul class="navbar-nav gap-lg-3">

<li class="nav-item">
<a class="nav-link" href="{% url 'dashboard' %}">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'order_list' %}">Orders</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'faq_list' %}">FAQ List</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'paid_orders' %}">Paid</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'pending_orders' %}">Pending</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'customer_list' %}">Customers</a>
</li>

<li class="nav-item">
<a class="nav-link text-danger" href="{% url 'user_logout' %}">
Logout
</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- PAGE -->

<div class="page-wrapper">

<div class="premium-card">

<h3 class="page-title">
<i class="bi bi-question-circle me-2"></i>
{% if faq %}Edit FAQ{% else %}Add FAQ{% endif %}
</h3>

<form method="POST">
{% csrf_token %}

<!-- QUESTION -->

<div class="mb-4">
<label class="form-label fw-semibold">Question</label>
<input type="text"
name="question"
value="{{ form.question.value|default_if_none:'' }}"
class="form-control big-input"
placeholder="Enter FAQ question">
</div>

<!-- ANSWER -->

<div class="mb-4">
<label class="form-label fw-semibold">Answer</label>
{{ form.answer }}
</div>

<button class="btn-save">
<i class="bi bi-check-circle me-1"></i>
{% if faq %}Update{% else %}Save{% endif %}
</button>

<a href="{% url 'faq_list' %}" class="btn btn-secondary btn-back ms-2">
Back
</a>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
