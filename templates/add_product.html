<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{background:#f6f6f6;font-family:'Poppins', sans-serif;}
.header-with-topbar{background:#000;box-shadow:0 4px 20px rgba(0,0,0,0.35);}
.dashboard-header{padding:18px 24px;}
.dashboard-header h4,.dashboard-header small,.dashboard-header i,.dashboard-header .nav-link{color:#fff!important;}
.page-wrapper{padding:40px 20px;}
.card{border:none;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,.08);}
.form-control,.form-select{border-radius:10px;padding:12px;}
.section-title{font-weight:600;border-left:4px solid #111;padding-left:10px;margin-bottom:10px;}
.variant-box{background:#fafafa;border:1px dashed #ccc;padding:15px;border-radius:12px;margin-bottom:15px;}
.color-pill{display:flex;gap:10px;align-items:center;}
.size-stock-row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;}
.remove-btn{background:#dc3545;color:#fff;border:0;border-radius:8px;padding:6px 10px;}
.btn-black{background:#111;color:#fff;border-radius:12px;padding:14px;width:100%;}
.badge-json{background:#111;color:#fff;border-radius:6px;padding:3px 8px;font-size:12px;}
.font-monospace{font-family:monospace;}
</style>
</head>

<body>

<header class="header-with-topbar">
<nav class="navbar dashboard-header navbar-expand-lg">
    <div class="container-fluid px-0">
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-speedometer2 fs-2"></i>
            <div>
                <h4 class="mb-0">Admin Dashboard</h4>
                <small>Overview of store performance</small>
            </div>
        </div>
    </div>
</nav>
</header>

<div class="page-wrapper">
<div class="container">
<div class="row justify-content-center">
<div class="col-lg-10">

<div class="card p-4">
<h4 class="fw-bold mb-4">Add New Product</h4>

<form method="POST" enctype="multipart/form-data" action="{% url 'add_product' %}">
{% csrf_token %}

<div class="section-title">Basic Information</div>
<div class="row g-3 mb-4">
    <div class="col-md-6"><input type="text" name="name" id="product_name" class="form-control" placeholder="Product Name" required></div>
    <div class="col-md-6"><input type="text" name="slug" id="slug" class="form-control" placeholder="Slug"></div>
    <div class="col-md-6"><input type="text" name="brand" class="form-control" placeholder="Brand"></div>
    <div class="col-md-6"><input type="text" name="product_code" class="form-control" placeholder="Product Code" required></div>
</div>

<div class="mb-4">
<select name="subcategory" class="form-select" required>
<option value="">Select</option>
{% for sub in subcategories %}
<option value="{{ sub.id }}">{{ sub.name }}</option>
{% endfor %}
</select>
</div>

<div class="section-title">Pricing</div>
<div class="row g-3 mb-4">
    <div class="col-md-4"><input type="number" name="price" class="form-control" placeholder="Price" required></div>
    <div class="col-md-4"><input type="number" name="old_price" class="form-control" placeholder="Old Price"></div>
    <div class="col-md-4"><input type="number" name="stock" id="totalStock" class="form-control" placeholder="Total Stock" readonly></div>
</div>

<div class="section-title">Color + Size + Stock</div>
<div id="variantWrapper"></div>
<button type="button" onclick="addColorVariant()" class="btn btn-outline-dark w-100 mb-4">➕ Add Color Variant</button>

<div class="section-title">Flags</div>
<div class="mb-4">
    <div class="form-check"><input class="form-check-input" type="checkbox" name="status" checked> Status</div>
    <div class="form-check"><input class="form-check-input" type="checkbox" name="is_signature_collection"> Signature Collection</div>
    <div class="form-check"><input class="form-check-input" type="checkbox" name="is_featured"> Featured</div>
    <div class="form-check"><input class="form-check-input" type="checkbox" name="is_best_seller"> Best Seller</div>
</div>

<div class="mb-4">
<textarea name="description" rows="4" class="form-control" placeholder="Description"></textarea>
</div>

<div class="section-title">Additional Info <span class="badge-json">JSON</span></div>
<div class="mb-4">
<textarea name="additional_info" rows="6" class="form-control font-monospace"></textarea>
</div>

<div class="section-title">Images</div>
<div class="row g-3 mb-4">
    <div class="col-md-4"><input type="file" name="image1" class="form-control"></div>
    <div class="col-md-4"><input type="file" name="image2" class="form-control"></div>
    <div class="col-md-4"><input type="file" name="image3" class="form-control"></div>
    <div class="col-md-4"><input type="file" name="image4" class="form-control"></div>
    <div class="col-md-4"><input type="file" name="image5" class="form-control"></div>
</div>

<button class="btn-black">Save Product</button>
</form>

</div>
</div>
</div>
</div>
</div>

<script>
function addColorVariant(){
    const wrapper = document.getElementById("variantWrapper");
    const html = `
    <div class="variant-box">
        <div class="color-pill mb-2">
            <input type="text" name="color_name[]" class="form-control" placeholder="Color Name" required>
            <input type="color" name="color_hex[]" class="form-control form-control-color" value="#000000">
            <button type="button" class="remove-btn" onclick="this.closest('.variant-box').remove();calculateTotalStock()">✖</button>
        </div>
        <div class="size-stock-row">
            <select name="variant_size[]" class="form-select" required>
                {% for size in sizes %}
                <option value="{{ size.id }}">{{ size.name }}</option>
                {% endfor %}
            </select>
            <input type="number" name="variant_stock[]" class="form-control stock-input" placeholder="Stock" oninput="calculateTotalStock()" required>
        </div>
    </div>`;
    wrapper.insertAdjacentHTML("beforeend", html);
}

function calculateTotalStock(){
    let total = 0;
    document.querySelectorAll(".stock-input").forEach(i => total += parseInt(i.value || 0));
    document.getElementById("totalStock").value = total;
}

document.addEventListener("DOMContentLoaded", function(){
    const nameInput = document.getElementById("product_name");
    const slugInput = document.getElementById("slug");

    if(nameInput){
        nameInput.addEventListener("keyup", function(){
            slugInput.value = this.value.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
        });
    }

    const textarea = document.querySelector('textarea[name="additional_info"]');
    if (textarea && textarea.value.trim() === "") {
        textarea.value = JSON.stringify({
            style_type: "Zari",
            material_type: "Silk"
        }, null, 4);
    }
});
</script>

</body>
</html>
