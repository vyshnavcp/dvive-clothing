
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#eef2f7,#dde3ec);
    min-height:100vh;
}

/* NAVBAR */

.navbar-premium{
    background:#000;
    padding:18px 30px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.navbar-brand{
    color:#fff !important;
    font-weight:600;
}

.nav-link{
    color:#ddd !important;
    font-weight:500;
}

.nav-link:hover{
    color:#fff !important;
}

/* PAGE */

.page-wrapper{
    padding:50px 20px;
}

/* CARD */

.premium-card{
    background:#fff;
    border:none;
    border-radius:22px;
    padding:40px;
    box-shadow:0 25px 60px rgba(0,0,0,.08);
}

/* SECTION TITLE */

.section-title{
    font-weight:600;
    margin-top:25px;
    margin-bottom:15px;
    padding-left:12px;
    border-left:4px solid #000;
}

/* INPUT */

.form-control,
.form-select{
    border-radius:12px;
    padding:12px;
    border:1px solid #e2e2e2;
}

.form-control:focus,
.form-select:focus{
    border-color:#000;
    box-shadow:none;
}

/* VARIANT BOX */

.variant-box{
    background:#fafafa;
    border:1px dashed #ccc;
    padding:15px;
    border-radius:14px;
    margin-bottom:15px;
}

.color-pill{
    display:flex;
    gap:10px;
    align-items:center;
}

.size-stock-row{
    display:grid;
    grid-template-columns:1fr 1fr auto;
    gap:10px;
}

/* BUTTONS */

.remove-btn{
    background:#dc3545;
    color:#fff;
    border:0;
    border-radius:8px;
    padding:6px 10px;
}

.btn-black{
    background:linear-gradient(45deg,#000,#333);
    color:#fff;
    border:none;
    border-radius:14px;
    padding:14px;
    width:100%;
    font-weight:600;
}

.btn-black:hover{
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* BADGE */

.badge-json{
    background:#000;
    color:#fff;
    border-radius:6px;
    padding:3px 8px;
    font-size:12px;
}

.font-monospace{
    font-family:monospace;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-premium">
<div class="container">

<a class="navbar-brand" href="#">
<i class="bi bi-speedometer2 me-2"></i> Product
</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="adminNavbar">

<ul class="navbar-nav gap-lg-3">

<li class="nav-item">
<a class="nav-link" href="{% url 'dashboard' %}">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'order_list' %}">Orders</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'product_list' %}">Product List</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'paid_orders' %}">Paid</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'pending_orders' %}">Pending</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'customer_list' %}">Customers</a>
</li>

<li class="nav-item">
<a class="nav-link logout" href="{% url 'user_logout' %}">
Logout
</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- PAGE -->

<div class="page-wrapper">

<div class="container">

<div class="premium-card">

<h3 class="fw-bold mb-4">
<i class="bi bi-box-seam me-2"></i> Add New Product
</h3>

<form method="POST" enctype="multipart/form-data" action="{% url 'add_product' %}">
{% csrf_token %}

<div class="section-title">Basic Information</div>

<div class="row g-3 mb-4">

<div class="col-md-6">
<input type="text" name="name" id="product_name" class="form-control" placeholder="Product Name" required>
</div>

<div class="col-md-6">
<input type="text" name="slug" id="slug" class="form-control" placeholder="Slug">
</div>

<div class="col-md-6">
<input type="text" name="brand" class="form-control" placeholder="Brand">
</div>

<div class="col-md-6">
<input type="text" name="product_code" class="form-control" placeholder="Product Code" required>
</div>

</div>

<div class="mb-4">
<select name="subcategory" class="form-select" required>
<option value="">Select Subcategory</option>
{% for sub in subcategories %}
<option value="{{ sub.id }}">{{ sub.name }}</option>
{% endfor %}
</select>
</div>

<div class="section-title">Pricing</div>

<div class="row g-3 mb-4">

<div class="col-md-3">
<input type="number" step="0.01" name="price" class="form-control" placeholder="Selling Price" required>
</div>

<div class="col-md-3">
<input type="number" step="0.01" name="cost_price" class="form-control" placeholder="Cost Price">
</div>

<div class="col-md-3">
<input type="number" step="0.01" name="old_price" class="form-control" placeholder="Old Price">
</div>

<div class="col-md-3">
<input type="number" name="stock" id="totalStock" class="form-control" placeholder="Total Stock" readonly>
</div>

</div>

<div class="section-title">Color + Size + Stock</div>

<div id="variantWrapper"></div>

<button type="button" onclick="addColorVariant()" class="btn btn-outline-dark w-100 mb-4">
➕ Add Color Variant
</button>

<div class="section-title">Flags</div>

<div class="mb-4">

<div class="form-check">
<input class="form-check-input" type="checkbox" name="status" checked> Status
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="is_signature_collection"> Signature Collection
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="is_featured"> Featured
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="is_best_seller"> Best Seller
</div>

</div>

<div class="mb-4">
<textarea name="description" rows="4" class="form-control" placeholder="Description"></textarea>
</div>

<div class="section-title">Additional Info <span class="badge-json">JSON</span></div>

<div class="mb-4">
<textarea name="additional_info" rows="6" class="form-control font-monospace"></textarea>
</div>

<div class="section-title">Images</div>

<div class="row g-3 mb-4">

<div class="col-md-4">
<input type="file" name="image1" class="form-control">
</div>

<div class="col-md-4">
<input type="file" name="image2" class="form-control">
</div>

<div class="col-md-4">
<input type="file" name="image3" class="form-control">
</div>

<div class="col-md-4">
<input type="file" name="image4" class="form-control">
</div>

<div class="col-md-4">
<input type="file" name="image5" class="form-control">
</div>

</div>

<button class="btn-black">
<i class="bi bi-check-circle me-1"></i> Save Product
</button>

</form>

</div>

</div>
</div>

<script>

function addColorVariant(){

const wrapper = document.getElementById("variantWrapper");

const html = `
<div class="variant-box">

<div class="color-pill mb-2">

<input type="text" name="color_name[]" class="form-control" placeholder="Color Name" required>

<input type="color" name="color_hex[]" class="form-control form-control-color" value="#000000">

<button type="button" class="remove-btn" onclick="this.closest('.variant-box').remove();calculateTotalStock()">✖</button>

</div>

<div class="size-stock-row">

<select name="variant_size[]" class="form-select" required>
{% for size in sizes %}
<option value="{{ size.id }}">{{ size.name }}</option>
{% endfor %}
</select>

<input type="number" name="variant_stock[]" class="form-control stock-input" placeholder="Stock" oninput="calculateTotalStock()" required>

</div>

</div>
`;

wrapper.insertAdjacentHTML("beforeend", html);

}

function calculateTotalStock(){

let total = 0;

document.querySelectorAll(".stock-input").forEach(i => total += parseInt(i.value || 0));

document.getElementById("totalStock").value = total;

}

document.addEventListener("DOMContentLoaded", function(){

const nameInput = document.getElementById("product_name");
const slugInput = document.getElementById("slug");

if(nameInput){

nameInput.addEventListener("keyup", function(){

slugInput.value = this.value.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");

});

}

const textarea = document.querySelector('textarea[name="additional_info"]');

if (textarea && textarea.value.trim() === "") {

textarea.value = JSON.stringify({
style_type: "Zari",
material_type: "Silk"
}, null, 4);

}

});

</script>

</body>
</html>
